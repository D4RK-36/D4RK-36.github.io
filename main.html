<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D4RK</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
        background: black;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* --- CENTER CARD --- */
    .card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        padding: 25px;
        border-radius: 20px;

        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 0 30px rgba(255,255,255,0.05);

        text-align: center;
    }

    /* --- PROFILE PICTURE --- */
    .pfp {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;

        margin-bottom: 15px;

        border: 2px solid rgba(255,255,255,0.2);

        box-shadow:
            0 0 15px rgba(255,255,255,0.15),
            0 0 30px rgba(120, 80, 255, 0.15);

        transition: 0.3s;
    }

    .pfp:hover {
        transform: scale(1.05);
        box-shadow:
            0 0 25px rgba(255,255,255,0.25),
            0 0 50px rgba(120, 80, 255, 0.25);
    }

    .card h1 {
        margin: 0;
        font-size: 28px;
    }

    .card p {
        opacity: 0.7;
        margin: 10px 0 20px;
    }

    .links a {
        display: block;
        margin: 8px 0;
        padding: 10px;
        border-radius: 10px;
        text-decoration: none;
        color: white;

        background: rgba(255,255,255,0.05);
        transition: 0.2s;
    }

    .links a:hover {
        background: rgba(255,255,255,0.15);
    }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="card">
    <!-- PFP ADDED HERE -->
    <img src="assets/pfp.png" alt="Profile Picture" class="pfp">

    <h1>D4RK</h1>
    <p>just vibing on the internet</p>

    <div class="links">
        <a href="#">YouTube</a>
        <a href="#">Discord</a>
        <a href="#">GitHub</a>
    </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let t = 0;

// --- STARS ---
let stars = [];
for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.1,
        opacity: Math.random()
    });
}

// --- NEBULA BLOBS ---
let nebula = [];
for (let i = 0; i < 3; i++) {
    nebula.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 300 + Math.random() * 200,
        speed: Math.random() * 0.2
    });
}

// --- DRAW BACKGROUND ---
function drawBackground() {
    const g = ctx.createRadialGradient(
        canvas.width/2,
        canvas.height/2,
        0,
        canvas.width/2,
        canvas.height/2,
        canvas.width
    );

    g.addColorStop(0, "#060608");
    g.addColorStop(1, "#000000");

    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// --- DRAW STARS ---
function drawStars() {
    stars.forEach(s => {
        s.opacity += Math.sin(t * 0.05) * 0.002;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = "white";
        ctx.fill();
        ctx.shadowBlur = 0;

        s.x += s.speed;
        if (s.x > canvas.width) {
            s.x = 0;
            s.y = Math.random() * canvas.height;
        }
    });
}

// --- DRAW NEBULA ---
function drawNebula() {
    nebula.forEach(n => {
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
        g.addColorStop(0, "rgba(120, 80, 255, 0.08)");
        g.addColorStop(1, "transparent");

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fill();

        n.x += Math.sin(t * 0.01) * 0.2;
    });
}

// --- PS3 STYLE WAVE ---
function drawWave(offset, alpha, thickness) {
    ctx.beginPath();

    for (let x = 0; x < canvas.width; x++) {
        let y =
            Math.sin(x * 0.006 + t * 0.5 + offset) * 30 +
            Math.sin(x * 0.012 + t * 0.3 + offset) * 15 +
            canvas.height / 2;

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = thickness;

    ctx.shadowBlur = 20;
    ctx.shadowColor = "rgba(255,255,255,0.2)";

    ctx.stroke();
    ctx.shadowBlur = 0;
}

// --- LOOP ---
function animate() {
    drawBackground();
    drawNebula();
    drawStars();

    drawWave(0, 0.15, 2);
    drawWave(2, 0.25, 1.5);
    drawWave(4, 0.2, 1);

    t += 0.01;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
