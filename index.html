<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D4RK</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: monospace;
    color: white;
    background: black;
}

/* VIDEO */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -3;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -2;
}

canvas {
    position: fixed;
    z-index: -1;
}

/* PROFILE */
.profile {
    position: absolute;
    top: 40%;
    left: 80px;
    transform: translateY(-50%);
}

.name {
    font-size: 48px;
    font-weight: bold;
}

.bio {
    margin-top: 10px;
    opacity: 0.8;
}

/* TOP INFO */
.top-info {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 14px;
    opacity: 0.8;
}

/* LINKS */
.links {
    margin-top: 25px;
    display: flex;
    gap: 18px;
}

.links img {
    object-fit: contain;
    transition: 0.2s;
    cursor: pointer;
    opacity: 0.85;
}

/* INDIVIDUAL FIXES */
.youtube {
    width: 28px;
    transform: scaleX(1.1);
}

.twitch {
    width: 36px;
    transform: scaleX(1.05);
}

.instagram {
    width: 32px;
    transform: scaleX(1.05);
}

.links img:hover {
    transform: scale(1.2);
    opacity: 1;
    filter: drop-shadow(0 0 8px white);
}

/* MUSIC BUTTON */
.music-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<video autoplay muted loop>
    <source src="assets/Background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<canvas id="bg"></canvas>

<div class="top-info">
    👁 <span id="views">0</span> &nbsp;&nbsp; 📍 Abyssus animae
</div>

<div class="profile">
    <div class="name">D4RK</div>
    <div class="bio">All roads lead to Rome</div>

    <div class="links">
        <a href="https://www.youtube.com/@D4RK_36" target="_blank">
            <img src="assets/youtube.png" class="youtube">
        </a>
        <a href="https://www.twitch.tv/d4rk_36" target="_blank">
            <img src="assets/twitch.png" class="twitch">
        </a>
        <a href="https://www.instagram.com/the3.6ram" target="_blank">
            <img src="assets/instagram.png" class="instagram">
        </a>
    </div>
</div>

<audio id="music" loop>
    <source src="assets/Music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" onclick="toggleMusic()">Mute Music</div>

<script>
/* CANVAS */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let t = 0;

/* STARS */
let stars = [];
for (let i = 0; i < 80; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.05
    });
}

function drawStars() {
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        s.x += s.speed;
        if (s.x > canvas.width) {
            s.x = 0;
            s.y = Math.random() * canvas.height;
        }
    });
}

/* WAVE */
function drawWave(offset, alpha) {
    ctx.beginPath();
    for (let x = 0; x < canvas.width; x++) {
        let y = Math.sin(x * 0.006 + t + offset) * 20 + canvas.height * 0.6;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.stroke();
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawStars();
    drawWave(0,0.2);
    drawWave(2,0.1);
    t += 0.01;
    requestAnimationFrame(animate);
}
animate();

/* MUSIC */
const music = document.getElementById("music");
let muted = false;

function toggleMusic() {
    muted = !muted;
    music.muted = muted;
    document.querySelector(".music-btn").innerText = muted ? "Unmute Music" : "Mute Music";
}

// try autoplay
music.play().catch(() => {
    document.body.addEventListener("click", () => music.play(), { once: true });
});

/* VIEW COUNTER (LOCAL) */
let views = localStorage.getItem("views") || 0;
views++;
localStorage.setItem("views", views);
document.getElementById("views").innerText = views;

/* TAB TITLE ANIMATION */
const text = "D4RK_36";
let i = 0;
let forward = true;

setInterval(() => {
    if (forward) {
        i++;
        if (i === text.length) forward = false;
    } else {
        i--;
        if (i === 0) forward = true;
    }
    document.title = text.substring(0, i);
}, 200);
</script>

</body>
</html>
