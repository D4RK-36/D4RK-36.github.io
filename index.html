<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<!-- Font (Angel Wish style alternative) -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* Star background */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Center container */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
}

/* Profile Picture */
.pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
}

/* Name with glow */
.name {
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    color: white;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow: 0 0 5px white, 0 0 10px white;
    }
    to {
        text-shadow: 0 0 20px white, 0 0 40px white;
    }
}

/* Bio */
.bio {
    color: white;
    font-size: 22px;
    margin: 15px 0 25px;
}

/* Links */
.link {
    display: block;
    color: white;
    text-decoration: none;
    font-size: 20px;
    margin: 10px 0;
    transition: 0.3s;
}

.link:hover {
    text-shadow: 0 0 10px white, 0 0 20px white;
}

/* Mute button */
.mute {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button class="mute" onclick="toggleMusic()">Mute</button>

<div class="container">
    <img src="pfp.png" class="pfp">

    <div class="name">D4RK_36</div>

    <div class="bio">All roads lead to Rome</div>

    <a class="link" href="https://www.youtube.com/@D4RK_36" target="_blank">YouTube</a>
    <a class="link" href="https://www.twitch.tv/d4rk_36" target="_blank">Twitch</a>
    <a class="link" href="https://www.instagram.com/the3.6ram" target="_blank">Instagram</a>
</div>

<!-- Music -->
<audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// MUSIC TOGGLE
let music = document.getElementById("music");
function toggleMusic() {
    if (music.muted) {
        music.muted = false;
    } else {
        music.muted = true;
    }
}

// STAR BACKGROUND
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1.5 + 0.5
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let star of stars) {
        ctx.fillStyle = "white";
        ctx.fillRect(star.x, star.y, star.size, star.size);

        star.y += star.speed;

        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    }

    requestAnimationFrame(drawStars);
}

drawStars();

// TITLE ANIMATION
const text = "D4RK_36";
let index = 0;
let forward = true;

function animateTitle() {
    if (forward) {
        document.title = text.substring(0, index++);
        if (index > text.length) {
            forward = false;
            setTimeout(animateTitle, 1000);
            return;
        }
    } else {
        document.title = text.substring(0, index--);
        if (index < 0) {
            forward = true;
            return;
        }
    }
    setTimeout(animateTitle, 150);
}

animateTitle();
</script>

</body>
</html>
